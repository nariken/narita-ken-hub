<style>

  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.6}
  .wrap{max-width:980px;margin:0 auto;padding:24px 18px 80px}
  header{text-align:center;padding:18px 0 8px}
  header .kicker{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.08em}
  header h1{font-size:26px;margin:6px 0 4px}
  header p{color:var(--muted);margin:0;font-size:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin:16px 0}
  .step{display:flex;align-items:center;gap:8px;font-weight:700;margin-bottom:10px}
  .step .n{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:13px}
  textarea{width:100%;min-height:120px;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;resize:vertical}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:10px 16px;font-weight:700;
    cursor:pointer;font-size:14px;font-family:var(--font)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .hint{color:var(--muted);font-size:12.5px}
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 14px}
  .pill{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px}
  .pill b{font-size:15px}
  .pill.ok b{color:var(--ok)} .pill.warn b{color:var(--warn)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:12px}
  tr.flag{background:rgba(255,176,32,.07)}
  td.amount{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:13px;font-family:var(--font)}
  tr.flag select{border-color:var(--warn)}
  .badge{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:700}
  .badge.auto{background:rgba(62,207,142,.15);color:var(--ok)}
  .badge.need{background:rgba(255,176,32,.15);color:var(--warn)}
  .tablewrap{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:8px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;line-height:1.8}
  footer a{color:var(--accent);text-decoration:none}
  .disclaimer{font-size:11.5px;color:var(--muted);margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#04140c;
    padding:10px 18px;border-radius:8px;font-weight:700;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
  .hidden{display:none}
  /* 受け皿(オプトイン)スロット — 既定は非表示。config.optin 設定時のみ表示 */
  .optin{background:var(--panel2);border:1px dashed var(--accent);border-radius:var(--radius);padding:16px;margin:16px 0}

    "sample": "注文日,商品名,金額\n2026-02-04,Anker USB-C ケーブル 2本セット,1980\n2026-02-06,書籍「実践Rustプログラミング」,3520\n2026-02-08,ロジクール ワイヤレスマウス,2980\n2026-02-11,コピー用紙 A4 2500枚,3200\n2026-02-13,HHKB Professional キーボード,36850\n2026-02-15,プロテイン 1kg チョコ味,4500\n2026-02-18,Kindle版「確定申告がわかる本」,1200\n2026-02-20,モバイルモニター 15.6インチ,25800\n2026-02-22,おむつ ビッグ 大容量パック,3800\n2026-02-25,HDMIケーブル 2m,990\n2026-02-27,Microsoft 365 Personal 1年版,12984\n2026-02-28,業務用プリンタ A3対応,128000",

  },

const T = TOOL.logic;
const UI = TOOL.ui;

// ── Outcome イベント（匿名集計・PIIなし） ───────────────────────────────────
// ユーザーの入力データは送信しない（従来どおりブラウザ内処理）。
// 送るのは「どの課題ツールが、どれだけ自動化の成果を出したか」という匿名の集計シグナルのみ。
// = Decision+Outcome モートの「測ったDelta」をツール層で拾う蛇口（設計=outcome_tool_factory_design.md）。
function gcEvent(name){
  try{
    if(window.goatcounter && typeof window.goatcounter.count === "function"){
      window.goatcounter.count({path:name, title:name, event:true});
    }
  }catch(e){/* analytics 失敗はツール本体に影響させない */}
}
function autoBucket(total, autoN){
  if(total<=0) return "0";
  const r = Math.round((autoN/total)*100);
  if(r>=100) return "100";
  if(r>=80) return "80-99";
  if(r>=50) return "50-79";
  return "0-49";
}

let rows = [];

function num(s){ if(!s) return 0; return parseInt(String(s).replace(/[^\d-]/g,""),10)||0; }
function yen(n){ const s=Math.abs(n).toLocaleString("ja-JP"); return (T.yenSignedNegative && n<0 ? "+" : "")+"¥"+s; }
function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const hasHeader = new RegExp(T.headerRegex, "i").test(lines[0]);
  const dataLines = hasHeader ? lines.slice(1) : lines;
  return dataLines.map(line=>{
    const c = line.split(",").map(s=>s.trim());
    const date = c[0]||"";
    const label = c[1]||"";
    let amount = 0;
    if(T.parseMode === "out_in"){
      if(c.length>=4){ amount = num(c[2]) || -num(c[3]); } else { amount = num(c[2]); }
    } else { // amount_fallback
      amount = num(c[2]);
      if(!amount){ for(let i=c.length-1;i>=2;i--){ if(num(c[i])){ amount=num(c[i]); break; } } }
    }
    return {date, label, amount};
  }).filter(r=>r.label);
}

function categorize(label, amount){
  const d = label.toLowerCase();
  if(T.negativeIncome && amount<0) return {cat:T.negativeIncome.category, flag:true, reason:T.negativeIncome.reason};
  if(T.assetThreshold && amount>=T.assetThreshold.amount) return {cat:T.assetThreshold.category, flag:true, reason:T.assetThreshold.reason};
  if(T.forceFlag){ for(const f of T.forceFlag.keywords){ if(d.includes(f.toLowerCase())) return {cat:T.forceFlag.category, flag:true, reason:T.forceFlag.reasonTpl.replace("{kw}",f)}; } }
  if(T.privateHints){ for(const p of T.privateHints.keywords){ if(d.includes(p.toLowerCase().trim())) return {cat:T.privateHints.category, flag:true, reason:T.privateHints.reason}; } }
  for(const r of T.rules){ for(const k of r.kw){ if(d.includes(k.toLowerCase())) return {cat:r.cat, flag:false, reason:`「${k}」に一致`}; } }
  return {cat:T.unknownCategory, flag:true, reason:T.unknownReason};
}

function run(){
  const parsed = parseCSV(document.getElementById("input").value);
  if(!parsed.length){ alert(T.parseErrorMsg); return; }
  rows = parsed.map(r=>{ const g=categorize(r.label,r.amount); return {...r, cat:g.cat, flag:g.flag, reason:g.reason}; });
  render();
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
  // Outcome: ツールが課題を解いた状態変化（自動化率）を匿名で記録
  const total=rows.length, flag=rows.filter(r=>r.flag).length, autoN=total-flag;
  gcEvent(`outcome-${TOOL.slug}-run`);
  gcEvent(`outcome-${TOOL.slug}-auto-${autoBucket(total, autoN)}`);
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  rows.forEach((r,i)=>{
    const tr = document.createElement("tr");
    if(r.flag) tr.className="flag";
    const opts = T.categories.map(c=>`<option ${c===r.cat?"selected":""}>${c}</option>`).join("");
    tr.innerHTML = `<td>${r.date}</td><td>${escapeHtml(r.label)}</td>
      <td class="amount">${yen(r.amount)}</td>
      <td><select data-i="${i}">${opts}</select></td>
      <td><span class="badge ${r.flag?"need":"auto"}">${r.flag?"要確認":"自動"}</span></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll("select").forEach(sel=>{
    sel.addEventListener("change",e=>{
      const i=+e.target.dataset.i; rows[i].cat=e.target.value;
      rows[i].flag = (e.target.value==="要確認");
      e.target.closest("tr").className = rows[i].flag?"flag":"";
      e.target.closest("tr").querySelector(".badge").className="badge "+(rows[i].flag?"need":"auto");
      e.target.closest("tr").querySelector(".badge").textContent = rows[i].flag?"要確認":"自動";
      updateCounts();
    });
  });
  updateCounts();
}

function updateCounts(){
  const total=rows.length, flag=rows.filter(r=>r.flag).length;
  document.getElementById("cTotal").textContent=total;
  document.getElementById("cAuto").textContent=total-flag;
  document.getElementById("cFlag").textContent=flag;
  document.getElementById("flagInline").textContent=flag;
}

function exportCSV(){
  const header = ["収支区分","発生日","勘定科目","金額","摘要"];
  const lines = rows.map(r=>{
    const type = (T.exportTypeBySign && r.amount<0) ? "収入":"支出";
    const note = `"${(T.exportLabelPrefix||"")}${r.label.replace(/"/g,'""')}"`;
    return [type, r.date, r.cat, Math.abs(r.amount), note].join(",");
  });
  const csv = "﻿"+[header.join(","),...lines].join("\r\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = T.exportFilename;
  a.click();
  toast("CSVを書き出しました");
  gcEvent(`outcome-${TOOL.slug}-export`); // Outcome: 価値を受け取り完了（主要コンバージョン）
}

function copyPrompt(){
  const need = rows.filter(r=>r.flag);
  if(!need.length){ toast(`要確認の${UI.itemNoun}はありません`); return; }
  const list = need.map(r=>`- ${r.date} / ${r.label} / ${yen(r.amount)}`).join("\n");
  const prompt = `${T.promptIntro}\n\n${UI.itemNoun}:\n${list}\n\n${T.promptFormat}`;
  navigator.clipboard.writeText(prompt).then(()=>toast("プロンプトをコピーしました"));
  gcEvent(`outcome-${TOOL.slug}-copyprompt`);
}

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

// ── 受け皿(オプトイン)スロット — config.optin がある場合のみ描画 ───────────────
// 既定(null)では何も描画しない＝KPI③受け皿は「前さばき(設計のみ)」。
// 6/19後にバックエンドGoが出たら config.optin を設定して有効化する。
function renderOptin(){
  const o = TOOL.optin;
  if(!o) return;
  const slot = document.getElementById("optin-slot");
  slot.innerHTML = `
    <div class="optin">
      <h3>${escapeHtml(o.heading||"")}</h3>
      <p>${escapeHtml(o.body||"")}</p>
      <form id="optin-form" ${o.action?`action="${o.action}" method="post"`:""}>
        <div class="row">
          <input type="email" name="email" placeholder="${escapeHtml(o.placeholder||"メールアドレス")}" required>
          <button type="submit">${escapeHtml(o.cta||"受け取る")}</button>
        </div>
        <label class="consent"><input type="checkbox" name="consent" required>
          <span>${escapeHtml(o.consent||"上記の目的での連絡に同意します。")}</span></label>
      </form>
    </div>`;
}

function boot(){
  // 文言の注入（config JSON が単一の正）
  document.documentElement.lang = TOOL.lang || "ja";
  document.getElementById("ui-kicker").textContent = UI.kicker;
  document.getElementById("ui-h1").textContent = UI.h1;
  document.getElementById("ui-subtitle").textContent = UI.subtitle;
  document.getElementById("ui-step1").textContent = UI.step1;
  document.getElementById("ui-inputHint").textContent = UI.inputHint;
  document.getElementById("input").setAttribute("placeholder", UI.placeholder);
  document.getElementById("ui-itemNoun").textContent = UI.itemNoun;
  document.getElementById("ui-resultHint").textContent = UI.resultHint;
  document.getElementById("ui-colDate").textContent = UI.cols[0];
  document.getElementById("ui-colLabel").textContent = UI.cols[1];
  document.getElementById("ui-colAmount").textContent = UI.cols[2];
  document.getElementById("ui-colCat").textContent = UI.cols[3];
  document.getElementById("ui-colJudge").textContent = UI.cols[4];
  // footerExtra は <a> を含むため innerHTML（生成時に信頼できる config のみ）
  document.getElementById("ui-footerExtra").innerHTML = UI.footerExtra || "";
  document.getElementById("ui-disclaimer").textContent = UI.disclaimer;
  renderOptin();

  document.getElementById("run").addEventListener("click",run);
  document.getElementById("sample").addEventListener("click",()=>{document.getElementById("input").value=T.sample;});
  document.getElementById("clear").addEventListener("click",()=>{document.getElementById("input").value="";document.getElementById("result").classList.add("hidden");});
  document.getElementById("export").addEventListener("click",exportCSV);
  document.getElementById("copyPrompt").addEventListener("click",copyPrompt);
}
document.addEventListener("DOMContentLoaded", boot);
</script>
